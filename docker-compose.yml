services:
  automaton:
    image: ghcr.io/bound3r/automaton:latest
    container_name: automaton
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/automaton:/app/data
    environment:
      - PORT=3000
      - AUTOMATON_DIR=/app/data
      - AUTOMATON_NAME=${AUTOMATON_NAME:-My Automaton}
      - AUTOMATON_GENESIS_PROMPT=${AUTOMATON_GENESIS_PROMPT:-You are a sovereign AI agent. Explore, learn, and grow.}
      - AUTOMATON_CREATOR_ADDRESS=${AUTOMATON_CREATOR_ADDRESS:-0x0000000000000000000000000000000000000000}
      # Set your API keys here or pass them via CasaOS environment UI
      - CONWAY_API_KEY=${CONWAY_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - CONWAY_API_URL=${CONWAY_API_URL:-https://api.conway.tech}
    x-casaos:
      envs:
        - container: AUTOMATON_NAME
          description:
            en_us: Name of your automaton
        - container: AUTOMATON_GENESIS_PROMPT
          description:
            en_us: Genesis prompt — the seed instruction for your automaton
        - container: AUTOMATON_CREATOR_ADDRESS
          description:
            en_us: Your Ethereum wallet address (0x...) — the human creator/owner
        - container: PORT
          description:
            en_us: Web UI port
        - container: CONWAY_API_KEY
          description:
            en_us: Conway API key (auto-provisioned on first run)
        - container: OPENAI_API_KEY
          description:
            en_us: OpenAI API key (optional, for OpenAI inference)
        - container: OLLAMA_BASE_URL
          description:
            en_us: Ollama base URL (optional, e.g. http://host.docker.internal:11434)
        - container: CONWAY_API_URL
          description:
            en_us: Conway API URL
      ports:
        - container: "3000"
          description:
            en_us: Web UI (Futuristic log viewer)
      volumes:
        - container: /app/data
          description:
            en_us: "Automaton data — wallet, config, database, state (host: /DATA/AppData/automaton)"
      icon: https://web4.ai/favicon.svg
      title:
        en_us: Conway Automaton
      tagline:
        en_us: Sovereign AI Agent Runtime
      overview:
        en_us: >
          Conway Automaton is a self-improving, self-replicating, sovereign AI agent.
          It earns its own existence through inference, on-chain transactions, and
          autonomous task execution. Open the Web UI to monitor the live log stream.
      category: AI
      port_map: "3000"
      index: /


